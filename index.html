<title>Feijão do CRM</title>

<style>
  :root {
    --ground: #FBF9F5;
    --panel: #FFFFFF;
    --line: #E6DFD3;
    --ink: #1A1713;
    --ink-soft: #5C554B;
    --ink-faint: #8B8377;
    --accent: #E24A12;
    --accent-deep: #B7370A;
    --accent-tint: rgba(226, 74, 18, 0.10);
    --grid: rgba(226, 74, 18, 0.07);
    --shadow: 0 1px 2px rgba(26,23,19,.05), 0 14px 34px -14px rgba(26,23,19,.16);

    --f-display: "Helvetica Neue", "Arial Nova", Arial, system-ui, sans-serif;
    --f-body: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --f-mono: ui-monospace, "SF Mono", "Menlo", "Cascadia Mono", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #0F0E0C; --panel: #17140F; --line: #2C271E;
      --ink: #F4EFE7; --ink-soft: #B7AE9F; --ink-faint: #7C7365;
      --accent: #FF6B33; --accent-deep: #FF884F;
      --accent-tint: rgba(255,107,51,.13); --grid: rgba(255,107,51,.08);
      --shadow: 0 1px 2px rgba(0,0,0,.5), 0 22px 50px -20px rgba(0,0,0,.75);
    }
  }
  :root[data-theme="light"] {
    --ground: #FBF9F5; --panel: #FFFFFF; --line: #E6DFD3;
    --ink: #1A1713; --ink-soft: #5C554B; --ink-faint: #8B8377;
    --accent: #E24A12; --accent-deep: #B7370A;
    --accent-tint: rgba(226,74,18,.10); --grid: rgba(226,74,18,.07);
    --shadow: 0 1px 2px rgba(26,23,19,.05), 0 14px 34px -14px rgba(26,23,19,.16);
  }
  :root[data-theme="dark"] {
    --ground: #0F0E0C; --panel: #17140F; --line: #2C271E;
    --ink: #F4EFE7; --ink-soft: #B7AE9F; --ink-faint: #7C7365;
    --accent: #FF6B33; --accent-deep: #FF884F;
    --accent-tint: rgba(255,107,51,.13); --grid: rgba(255,107,51,.08);
    --shadow: 0 1px 2px rgba(0,0,0,.5), 0 22px 50px -20px rgba(0,0,0,.75);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: var(--ground); color: var(--ink);
    font-family: var(--f-body); -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 22px 32px;
    position: relative; overflow-x: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 46px 46px;
    -webkit-mask-image: radial-gradient(ellipse 90% 55% at 50% 0%, #000 35%, transparent 90%);
    mask-image: radial-gradient(ellipse 90% 55% at 50% 0%, #000 35%, transparent 90%);
  }

  .card { position: relative; z-index: 1; width: 100%; max-width: 440px; }

  .head { text-align: center; margin-bottom: 34px; }
  .avatar {
    width: 84px; height: 84px; margin: 0 auto 18px; border-radius: 22px;
    background: var(--accent-tint); border: 1.5px solid var(--accent);
    display: grid; place-items: center; position: relative;
    box-shadow: var(--shadow);
  }
  .avatar::before, .avatar::after { content: ""; position: absolute; background: var(--accent); }
  .avatar::before { width: 4px; height: 42px; left: 30px; top: 21px; border-radius: 2px; }
  .avatar::after { width: 30px; height: 4px; left: 30px; top: 42px; border-radius: 2px; }

  .name {
    font-family: var(--f-display); font-weight: 800; font-size: 30px;
    letter-spacing: -.02em; margin: 0;
  }
  .role {
    font-family: var(--f-mono); font-size: 11px; letter-spacing: .2em;
    text-transform: uppercase; color: var(--accent); margin: 9px 0 0;
  }
  .tagline {
    margin: 14px auto 0; max-width: 34ch; color: var(--ink-soft);
    font-size: 15.5px; line-height: 1.5;
  }

  .links { display: flex; flex-direction: column; gap: 13px; }
  .link {
    display: flex; align-items: center; gap: 15px; text-decoration: none;
    background: var(--panel); border: 1px solid var(--line); border-radius: 15px;
    padding: 17px 18px; color: var(--ink); box-shadow: var(--shadow);
    transition: transform .16s ease, border-color .2s ease, background .2s ease;
  }
  .link:hover { transform: translateY(-2px); border-color: var(--accent); }
  .link .ic {
    width: 42px; height: 42px; flex: none; border-radius: 12px;
    background: var(--accent-tint); color: var(--accent);
    display: grid; place-items: center;
  }
  .link .ic svg { width: 21px; height: 21px; }
  .link .txt { flex: 1; min-width: 0; }
  .link .txt small {
    display: block; font-family: var(--f-mono); font-size: 10px;
    letter-spacing: .12em; text-transform: uppercase; color: var(--ink-faint);
  }
  .link .txt strong { display: block; font-size: 16px; font-weight: 600; margin-top: 2px; }
  .link .arrow { color: var(--ink-faint); flex: none; transition: transform .16s ease, color .2s ease; }
  .link:hover .arrow { color: var(--accent); transform: translateX(3px); }

  /* primary highlighted */
  .link.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
    box-shadow: 0 10px 26px -10px var(--accent);
  }
  .link.primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  .link.primary .ic { background: rgba(255,255,255,.18); color: #fff; }
  .link.primary .txt small { color: rgba(255,255,255,.72); }
  .link.primary .arrow { color: rgba(255,255,255,.8); }
  .link.primary:hover .arrow { color: #fff; }

  footer {
    position: relative; z-index: 1; margin-top: 38px; text-align: center;
    font-family: var(--f-mono); font-size: 11px; letter-spacing: .1em;
    color: var(--ink-faint); text-transform: uppercase;
  }

  .card { opacity: 0; transform: translateY(14px); animation: rise .6s ease forwards; }
  .head { animation-delay: 0s; }
  @keyframes rise { to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .card { opacity: 1; transform: none; animation: none; }
    .link, .link .arrow { transition: none; }
  }
</style>
